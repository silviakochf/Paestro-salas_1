<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAESTRO - Exportar</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/exportar.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='css/favicon12.png') }}" type="image/png">
    <style>
        .export-container {
            max-width: 720px;
            margin: 2rem auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,.08);
            padding: 2.5rem 2rem;
            text-align: center;
        }
        .export-container h3 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 1.75rem;
        }
        .export-section-title {
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 1rem;
        }
        .escola-badge {
            display: inline-flex;
            align-items: center;
            gap: .4rem;
            background: #f0f9ff;
            border: 1px solid #7dd3fc;
            color: #0369a1;
            border-radius: 20px;
            padding: .3rem 1rem;
            font-size: .85rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }
        .folder-search-wrap {
            display: flex;
            align-items: center;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: .5rem .85rem;
            background: #fff;
            position: relative;
        }
        .folder-search-wrap i.fa-search { color: #94a3b8; margin-right: .5rem; flex-shrink:0 }
        #folder-search {
            flex: 1;
            border: none;
            outline: none;
            font-size: .9rem;
            color: #1e293b;
            background: transparent;
        }
        #folder-search::placeholder { color: #94a3b8; }
        #folder-dropdown-arrow { color: #475569; cursor: pointer; padding: 0 .25rem; flex-shrink:0 }
        #folder-list {
            border: 1px solid #cbd5e1;
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 220px;
            overflow-y: auto;
            display: none;
            text-align: left;
            background: #fff;
            box-shadow: 0 4px 12px rgba(0,0,0,.08);
            margin-bottom: 1.25rem;
        }
        .folder-item {
            padding: .65rem 1.1rem;
            cursor: pointer;
            font-size: .9rem;
            color: #334155;
            border-bottom: 1px solid #f1f5f9;
            transition: background .1s;
        }
        .folder-item:last-child { border-bottom: none; }
        .folder-item:hover { background: #f8fafc; }
        .folder-item.selected { background: #eff6ff; color: #1d4ed8; font-weight: 500; }
        .btn-drive {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: .5rem;
            padding: .75rem 2rem;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background .2s;
            width: 100%;
            margin-top: 1rem;
            margin-bottom: .5rem;
        }
        .btn-drive:hover:not(:disabled) { background: #1d4ed8; }
        .btn-drive:disabled { opacity: .5; cursor: not-allowed; }
        .divider {
            display: flex;
            align-items: center;
            gap: .75rem;
            color: #94a3b8;
            font-size: .85rem;
            margin: 1.5rem 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }
        .btn-excel {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: .5rem;
            padding: .75rem 2rem;
            background: #16a34a;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background .2s;
            width: 100%;
        }
        .btn-excel:hover { background: #15803d; }
        #export-result {
            margin-top: .75rem;
            padding: .7rem 1rem;
            border-radius: 8px;
            font-size: .875rem;
            display: none;
        }
        .result-ok   { background: #d1fae5; color: #065f46; border: 1px solid #86efac; }
        .result-fail { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header-wrapper">
        <header>
            <div class="header-left">
                <span id="data-atual"></span>
                <span id="periodo-usuario"></span>
            </div>
            <div class="header-center">
                <img src="{{ url_for('static', filename='images/logo_paestro.png') }}" alt="Logo PAESTRO" class="logo">
            </div>
            <div class="header-right">
                <div class="user-info">
                    <div class="user-icon"><i class="fas fa-user"></i></div>
                    <span id="nome-usuario"></span>
                </div>
            </div>
        </header>
    </div>

    <nav class="nav-container">
        <div class="nav-links">
            <a href="/" class="nav-link"><i class="fas fa-home"></i> Início</a>
            <a href="/importar" class="nav-link"><i class="fas fa-file-import"></i> Importar</a>
            <a href="/salas" class="nav-link"><i class="fas fa-door-open"></i> Salas</a>
            <a href="/exportar" class="nav-link active"><i class="fas fa-file-export"></i> Exportar</a>
        </div>
    </nav>

    <main>
        <div class="export-container">
            <h3>Exportar Conferência de Salas</h3>

            <div id="escola-wrap" style="display:none">
                <div class="escola-badge">
                    <i class="fas fa-school"></i>
                    <span id="escola-label">—</span>
                </div>
            </div>

            <p class="export-section-title">Salvar conferência no Google Drive</p>

            <div class="folder-search-wrap">
                <i class="fas fa-search"></i>
                <input type="text" id="folder-search" placeholder="Buscar pasta..."/>
                <i class="fas fa-chevron-down" id="folder-dropdown-arrow" onclick="toggleDropdown()"></i>
            </div>

            <div id="folder-list"></div>

            <button class="btn-drive" id="btn-drive" onclick="salvarNoDrive()">
                <i class="fas fa-cloud-upload-alt"></i> Salvar no Drive
            </button>

            <div id="export-result"></div>

            <div class="divider">ou</div>

            <p class="export-section-title">Baixar conferência no dispositivo</p>
            <button class="btn-excel" onclick="baixarExcel()">
                <i class="fas fa-file-excel"></i> Baixar Excel
            </button>
        </div>
    </main>

    <footer>
        <p>Secretaria de Educação © {{ now.year }}</p>
    </footer>

    <script src="{{ url_for('static', filename='js/modal.js') }}"></script>
    <script src="{{ url_for('static', filename='js/exportar.js') }}?v={{ range(1,99999)|random }}"></script>
</body>
</html>
